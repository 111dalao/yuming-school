<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yu Ming Charter School · 数据详览</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-mono/style.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080a;
  --bg-card:rgba(255,255,255,.025);
  --bg-card-inner:rgba(255,255,255,.04);
  --bg-hover:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.06);
  --border-hover:rgba(255,255,255,.12);
  --text-primary:#e8eaed;
  --text-secondary:rgba(255,255,255,.5);
  --text-tertiary:rgba(255,255,255,.3);
  --accent:#34d399;
  --accent-dim:rgba(52,211,153,.1);
  --accent-glow:rgba(52,211,153,.2);
  --info:#60a5fa;
  --radius:1.25rem;
  --ease:cubic-bezier(.16,1,.3,1);
  --spring:cubic-bezier(.32,.72,0,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'Geist Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--text-primary);
  min-height:100dvh;line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'Geist Mono',monospace}

.bg-mesh{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 10% 8%,rgba(52,211,153,.03),transparent),
    radial-gradient(ellipse 400px 500px at 90% 90%,rgba(96,165,250,.025),transparent);
}

.container{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:0 1.5rem 4rem}

.header{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1.75rem;
  flex-wrap:wrap;
}
.back-link{
  display:inline-flex;align-items:center;gap:.5rem;
  font-size:.82rem;color:var(--text-secondary);
  text-decoration:none;transition:color .25s;
}
.back-link:hover{color:var(--accent)}
.back-link svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.header h1{font-size:1.25rem;font-weight:600;letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:1rem;font-size:.88rem;color:var(--text-tertiary)}
.header-right .mono{color:var(--text-secondary)}

.filter-bar{
  display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;
  padding:1rem 1.25rem;border-radius:var(--radius);
  background:var(--bg-card);border:1px solid var(--border);
  margin-bottom:1.25rem;
}
.filter-bar label{font-size:.85rem;color:var(--text-tertiary);font-weight:500;margin-right:.15rem}
.filter-bar input,.filter-bar select{
  font-family:'Geist Sans',sans-serif;
  font-size:.88rem;color:var(--text-primary);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:.5rem .8rem;outline:none;
  transition:border-color .25s,box-shadow .25s;
  color-scheme:dark;
}
.filter-bar input:focus,.filter-bar select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-dim);
}
.filter-bar input[type="date"]{width:140px;color-scheme:dark}
.filter-bar select{min-width:100px;cursor:pointer}
.filter-bar input[type="text"]{flex:1;min-width:180px}
.filter-group{display:flex;align-items:center;gap:.35rem}
.filter-sep{width:1px;height:24px;background:rgba(255,255,255,.06);margin:0 .25rem}

.ms-wrap{position:relative;min-width:130px}
.ms-trigger{
  display:flex;align-items:center;justify-content:space-between;gap:.35rem;
  font-family:'Geist Sans',sans-serif;font-size:.88rem;
  color:var(--text-primary);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:.5rem .8rem;cursor:pointer;min-width:100%;
  transition:border-color .25s,box-shadow .25s;
}
.ms-trigger:hover,.ms-trigger.open{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.ms-trigger .ms-count{font-family:'Geist Mono',monospace;font-size:.75rem;color:var(--accent)}
.ms-trigger .ms-arrow{font-size:.65rem;color:var(--text-tertiary);transition:transform .25s}
.ms-trigger.open .ms-arrow{transform:rotate(180deg)}
.ms-panel{
  position:absolute;top:calc(100% + 6px);left:0;z-index:50;
  min-width:100%;max-height:240px;overflow-y:auto;
  background:rgba(14,16,20,.98);border:1px solid rgba(255,255,255,.1);
  border-radius:10px;padding:.4rem;display:none;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.ms-panel.show{display:block}
.ms-item{
  display:flex;align-items:center;gap:.5rem;
  padding:.45rem .6rem;border-radius:6px;cursor:pointer;
  font-size:.82rem;color:var(--text-secondary);
  transition:background .15s;
}
.ms-item:hover{background:rgba(255,255,255,.05);color:var(--text-primary)}
.ms-item.selected{background:var(--accent-dim);color:var(--accent)}
.ms-item input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  font-family:'Geist Sans',sans-serif;
  font-size:.88rem;font-weight:500;
  padding:.55rem 1.1rem;border-radius:8px;border:none;cursor:pointer;
  transition:all .25s var(--spring);
}
.btn-accent{background:var(--accent);color:#06080a}
.btn-accent:hover{background:#4ade80;box-shadow:0 0 20px var(--accent-glow)}
.btn-ghost{
  background:rgba(255,255,255,.04);color:var(--text-secondary);
  border:1px solid rgba(255,255,255,.08);
}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--text-primary)}
.btn-sm{padding:.4rem .8rem;font-size:.82rem}

.results-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:.75rem;font-size:.88rem;color:var(--text-tertiary);
}

.table-wrap{
  border-radius:var(--radius);overflow-x:auto;
  background:var(--bg-card);border:1px solid var(--border);
}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{
  font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-tertiary);text-align:left;
  padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);position:sticky;top:0;
}
.col-date{width:12%}
.col-platform{width:9%}
.col-topic{width:10%}
.col-relevance{width:7%}
.col-text{width:62%}
tbody tr{
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .2s;
}
tbody tr:hover{background:var(--bg-hover)}
tbody td{padding:.75rem 1rem;font-size:.9rem;vertical-align:top;overflow:hidden;text-overflow:ellipsis}
.cell-date{font-family:'Geist Mono',monospace;font-size:.85rem;color:var(--text-secondary);white-space:nowrap}
.cell-platform{
  display:inline-block;font-size:.78rem;font-weight:500;
  padding:.2rem .55rem;border-radius:5px;
  background:rgba(96,165,250,.1);color:#93bbfd;
}
.cell-topic{
  display:inline-block;font-size:.75rem;font-weight:500;
  padding:.2rem .55rem;border-radius:5px;
  background:rgba(167,139,250,.1);color:#c4b5fd;
}
.cell-relevance{
  font-family:'Geist Mono',monospace;font-size:.82rem;font-weight:600;
}
.cell-text{cursor:pointer;transition:color .2s;}
.cell-text-inner{
  overflow:hidden;text-overflow:ellipsis;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  word-break:break-all;
}
.cell-text:hover .cell-text-inner{color:var(--accent)}

.empty-state{
  text-align:center;padding:3rem;color:var(--text-tertiary);font-size:.85rem;
}

.pagination{
  display:flex;align-items:center;justify-content:center;gap:.35rem;
  margin-top:1.25rem;
}
.pagination button{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:36px;height:36px;border-radius:8px;
  font-family:'Geist Mono',monospace;font-size:.82rem;
  border:1px solid rgba(255,255,255,.06);cursor:pointer;
  background:rgba(255,255,255,.02);color:var(--text-secondary);
  transition:all .2s var(--spring);
}
.pagination button:hover:not(:disabled){
  background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:var(--text-primary);
}
.pagination button.active{
  background:var(--accent);color:#06080a;border-color:var(--accent);font-weight:600;
}
.pagination button:disabled{opacity:.3;cursor:default}
.pagination .pg-info{font-size:.82rem;color:var(--text-tertiary);margin:0 .5rem}
.pg-input{
  width:52px;height:36px;border-radius:8px;text-align:center;
  font-family:'Geist Mono',monospace;font-size:.82rem;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  color:var(--text-primary);outline:none;transition:border-color .25s;
}
.pg-input:focus{border-color:var(--accent)}
.pg-err{color:#f87171;font-size:.72rem;margin-left:.4rem}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s var(--ease);
}
.modal-overlay.open{display:flex;opacity:1}
.modal{
  width:min(680px,92vw);max-height:85vh;overflow-y:auto;
  border-radius:1.5rem;background:rgba(14,16,20,.97);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 40px 100px rgba(0,0,0,.6);
  transform:translateY(16px) scale(.97);
  transition:transform .35s var(--spring);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06);
}
.modal-header h2{font-size:1.1rem;font-weight:600;letter-spacing:-.015em}
.modal-close{
  width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;
  background:rgba(255,255,255,.04);color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;transition:all .2s;
}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--text-primary)}
.modal-body{padding:1.5rem}

.detail-section{margin-bottom:1.25rem}
.detail-section:last-child{margin-bottom:0}
.detail-label{
  font-size:.82rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;
  color:var(--text-tertiary);margin-bottom:.5rem;
}
.detail-text{
  font-size:.95rem;line-height:1.75;color:var(--text-primary);
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  border-radius:10px;padding:1rem;max-height:300px;overflow-y:auto;
}
.detail-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:.75rem;
}
.meta-item{
  padding:.7rem;border-radius:10px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
}
.meta-item .ml{font-size:.8rem;color:var(--text-tertiary);margin-bottom:.3rem;font-weight:500}
.meta-item .mv{font-size:.92rem;color:var(--text-primary)}
.meta-item .mv.mono{font-family:'Geist Mono',monospace;font-size:.85rem}
.meta-full{grid-column:span 2}

.loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:.5rem}
.spinner{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(255,255,255,.08);border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading span{font-size:.8rem;color:var(--text-tertiary)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
.modal::-webkit-scrollbar{width:4px}

@media(max-width:768px){
  .filter-bar{flex-direction:column;align-items:stretch}
  .filter-group{flex-wrap:wrap}
  .filter-sep{display:none}
  .detail-meta{grid-template-columns:1fr}
  .meta-full{grid-column:span 1}
  .col-platform,.col-topic,.col-relevance{display:none}
  .container{padding:0 1rem 3rem}
  .header h1{font-size:1.1rem}
  .filter-bar input[type="text"]{min-width:auto;width:100%}
  .filter-bar input[type="date"]{width:auto;flex:1}
  .header-right{font-size:.75rem;gap:.5rem}
}

@media(max-width:640px){
  .header{flex-direction:column;align-items:flex-start}
  .header h1{font-size:1rem}
  .result-list > div{padding:.75rem}
  .col-title{font-size:.82rem}
  .col-snippet{font-size:.7rem}
  .col-meta{font-size:.65rem}
  .filter-bar{padding:.75rem;gap:.4rem}
  .filter-bar input,.filter-bar select,.ms-trigger{font-size:.78rem;padding:.4rem .6rem}
  .filter-bar input[type="date"]{width:100%}
  .filter-group{width:100%}
  .ms-trigger{min-width:100%}
  /* Stack pagination */
  .pagination{flex-wrap:wrap;gap:.5rem;justify-content:center}
  /* Modal smaller */
  .modal-content{width:96vw;padding:1.25rem}
  .modal-title{font-size:1.05rem}
  .modal-body{font-size:.85rem}
}
</style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="container">

  <div class="header">
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回看板
    </a>
    <h1>Yu Ming · 数据详览</h1>
    <div class="header-right">
      <span class="mono" id="totalCount">---</span>
      <span>条记录</span>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>起始</label>
      <input type="date" id="dateFrom">
    </div>
    <div class="filter-group">
      <label>截止</label>
      <input type="date" id="dateTo">
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <label>平台</label>
      <div class="ms-wrap" id="msPlatform">
        <div class="ms-trigger" onclick="toggleMs('msPlatform')">
          <span>全部平台</span><span class="ms-count"></span><span class="ms-arrow">&#9660;</span>
        </div>
        <div class="ms-panel" id="msPlatformPanel"></div>
      </div>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group">
      <label>主题</label>
      <div class="ms-wrap" id="msGroup">
        <div class="ms-trigger" onclick="toggleMs('msGroup')">
          <span>全部主题</span><span class="ms-count"></span><span class="ms-arrow">&#9660;</span>
        </div>
        <div class="ms-panel" id="msGroupPanel"></div>
      </div>
    </div>
    <div class="filter-sep"></div>
    <div class="filter-group" style="flex:1;min-width:180px">
      <label>搜索</label>
      <input type="text" id="searchInput" placeholder="输入关键词...">
    </div>
    <button class="btn btn-accent btn-sm" onclick="applyFilter()">筛选</button>
    <button class="btn btn-ghost btn-sm" onclick="resetFilter()">重置</button>
  </div>

  <!-- Results -->
  <div class="results-bar">
    <span id="resultsInfo">---</span>
    <span id="pageInfo" class="mono"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-date">日期</th>
          <th class="col-platform">平台</th>
          <th class="col-topic">主题</th>
          <th class="col-relevance">相关度</th>
          <th class="col-text">标题 / 摘要</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5"><div class="loading"><div class="spinner"></div><span>加载中...</span></div></td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>讨论详情</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
let state = { page:1, q:'', from:'', to:'', platform:'', groups: new Set() };
const PER_PAGE = 50;

document.addEventListener('DOMContentLoaded', async () => {
  const [platforms, groups] = await Promise.all([
    fetch('/api/platforms').then(r => r.json()),
    fetch('/api/group-options').then(r => r.json()),
  ]);

  // Platform multi-select
  buildMsSingle('msPlatform', platforms.map(p => ({ value: p.name, label: p.name })));

  // Group multi-select
  buildMsMulti('msGroup', groups);

  const params = new URLSearchParams(location.search);
  if (params.get('q')) { state.q = params.get('q'); document.getElementById('searchInput').value = state.q; }
  if (params.get('from')) { state.from = params.get('from'); document.getElementById('dateFrom').value = state.from; }
  if (params.get('to')) { state.to = params.get('to'); document.getElementById('dateTo').value = state.to; }
  if (params.get('platform')) {
    state.platform = params.get('platform');
    syncMsChecks('msPlatform');
    updateMsDisplay('msPlatform');
  }
  if (params.get('groups')) {
    state.groups = new Set(params.get('groups').split(','));
    syncMsChecks('msGroup');
    updateMsDisplay('msGroup');
  }
  if (params.get('page')) state.page = parseInt(params.get('page')) || 1;

  loadPage();

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') applyFilter();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.ms-wrap')) {
      document.querySelectorAll('.ms-panel.show').forEach(p => p.classList.remove('show'));
      document.querySelectorAll('.ms-trigger.open').forEach(t => t.classList.remove('open'));
    }
  });
});

/* Multi-select helpers */
function buildMsSingle(id, options) {
  const panel = document.getElementById(id + 'Panel');
  panel.innerHTML = options.map(opt =>
    '<div class="ms-item" onclick="selectMsSingle(\'' + id + '\',\'' + opt.value + '\')">' +
    '<input type="radio" name="' + id + 'Radio" value="' + opt.value + '">' +
    '<label>' + opt.label + '</label></div>'
  ).join('');
  // "All" option
  panel.insertAdjacentHTML('afterbegin',
    '<div class="ms-item" onclick="selectMsSingle(\'' + id + '\',\'\')">' +
    '<input type="radio" name="' + id + 'Radio" value="" checked>' +
    '<label>全部平台</label></div>'
  );
}

function buildMsMulti(id, options) {
  const panel = document.getElementById(id + 'Panel');
  panel.innerHTML = options.map(opt =>
    '<div class="ms-item" onclick="toggleMsCheck(\'' + id + '\',\'' + opt.value + '\',event)">' +
    '<input type="checkbox" value="' + opt.value + '">' +
    '<label>' + opt.label + '</label></div>'
  ).join('');
}

function selectMsSingle(id, value) {
  if (id === 'msPlatform') state.platform = value;
  const panel = document.getElementById(id + 'Panel');
  panel.querySelectorAll('input[type=radio]').forEach(r => { r.checked = r.value === value; });
  updateMsDisplay(id);
}

function toggleMs(id) {
  const panel = document.getElementById(id + 'Panel');
  const trigger = panel.parentElement.querySelector('.ms-trigger');
  const show = !panel.classList.contains('show');
  document.querySelectorAll('.ms-panel.show').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.ms-trigger.open').forEach(t => t.classList.remove('open'));
  if (show) { panel.classList.add('show'); trigger.classList.add('open'); }
}

function toggleMsCheck(id, value, event) {
  if (event) event.stopPropagation();
  let set = state.groups;
  if (set.has(value)) set.delete(value); else set.add(value);
  syncMsChecks(id);
  updateMsDisplay(id);
}

function syncMsChecks(id) {
  let set = state.groups;
  if (id === 'msPlatform') {
    document.getElementById(id + 'Panel').querySelectorAll('input[type=radio]').forEach(r => {
      r.checked = r.value === state.platform;
    });
    return;
  }
  document.getElementById(id + 'Panel').querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.checked = set.has(cb.value);
  });
}

function updateMsDisplay(id) {
  const wrap = document.getElementById(id);
  const trigger = wrap.querySelector('.ms-trigger');
  const countEl = trigger.querySelector('.ms-count');
  const labelEl = trigger.querySelector('span:first-child');
  if (id === 'msPlatform') {
    labelEl.textContent = state.platform || '全部平台';
    countEl.textContent = '';
  } else {
    if (state.groups.size === 0) { labelEl.textContent = '全部主题'; countEl.textContent = ''; }
    else { labelEl.textContent = '已选'; countEl.textContent = state.groups.size; }
  }
}

/* Data loading */
async function loadPage() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="5"><div class="loading"><div class="spinner"></div><span>加载中...</span></div></td></tr>';

  const params = new URLSearchParams({
    page: state.page, per_page: PER_PAGE,
    q: state.q, from: state.from, to: state.to,
    platform: state.platform,
    groups: [...state.groups].join(','),
  });
  history.replaceState(null, '', '?' + params.toString());

  try {
    const data = await fetch('/api/discussions?' + params).then(r => r.json());
    document.getElementById('totalCount').textContent = data.total.toLocaleString('zh-CN');
    document.getElementById('resultsInfo').textContent =
      '共 ' + data.total.toLocaleString('zh-CN') + ' 条结果';
    document.getElementById('pageInfo').textContent =
      '第 ' + data.page + ' / ' + data.total_pages + ' 页';

    if (!data.items.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">没有匹配的记录</div></td></tr>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    tbody.innerHTML = data.items.map(item => {
      const dateStr = (item.date || '').slice(0, 10);
      const platStr = item.platform || '---';
      const topicStr = item.keyword_group || '---';
      const relScore = item.relevance_score != null ? (item.relevance_score * 100).toFixed(0) + '%' : '---';
      const relColor = item.relevance_score >= 0.7 ? '#34d399' :
                       item.relevance_score >= 0.5 ? '#fbbf24' :
                       item.relevance_score >= 0.3 ? '#fb923c' : '#f87171';
      const titleStr = (item.title || '---').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const contentStr = (item.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0, 150);

      return '<tr>' +
        '<td class="cell-date">' + dateStr + '</td>' +
        '<td><span class="cell-platform">' + platStr + '</span></td>' +
        '<td><span class="cell-topic">' + topicStr + '</span></td>' +
        '<td><span class="cell-relevance mono" style="color:' + relColor + '">' + relScore + '</span></td>' +
        '<td class="cell-text" onclick="openDetail(' + item.idx + ')" title="点击查看详情">' +
          '<div class="cell-text-inner"><strong>' + titleStr + '</strong> — ' + contentStr + '</div>' +
        '</td></tr>';
    }).join('');

    renderPagination(data.page, data.total_pages);
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">加载失败，请稍后重试</div></td></tr>';
  }
}

function renderPagination(page, total) {
  const el = document.getElementById('pagination');
  if (total <= 1) { el.innerHTML = ''; return; }
  let html = '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (page-1) + ')">&lsaquo;</button>';
  const range = buildRange(page, total);
  range.forEach(p => {
    if (p === '...') html += '<span class="pg-info">...</span>';
    else html += '<button class="' + (p === page ? 'active' : '') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  });
  html += '<button ' + (page >= total ? 'disabled' : '') + ' onclick="goPage(' + (page+1) + ')">&rsaquo;</button>';
  html += '<span class="pg-info">前往</span>';
  html += '<input type="text" class="pg-input" id="pageInput" value="' + page + '" onkeydown="onPageInputKey(event,' + total + ')" placeholder="' + page + '">';
  html += '<span class="pg-info">/ ' + total + ' 页</span>';
  html += '<span class="pg-err" id="pgErr"></span>';
  el.innerHTML = html;
}

function onPageInputKey(e, total) {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  const num = parseInt(val, 10);
  if (!/^\d+$/.test(val) || num < 1 || num > total) {
    document.getElementById('pgErr').textContent = '输入有误';
    return;
  }
  document.getElementById('pgErr').textContent = '';
  goPage(num);
}

function buildRange(cur, total) {
  if (total <= 7) return Array.from({length:total}, (_,i) => i+1);
  const r = [1];
  if (cur > 3) r.push('...');
  for (let i = Math.max(2, cur-1); i <= Math.min(total-1, cur+1); i++) r.push(i);
  if (cur < total-2) r.push('...');
  r.push(total);
  return r;
}

function goPage(p) {
  state.page = p;
  loadPage();
  window.scrollTo({top:0, behavior:'smooth'});
}

function applyFilter() {
  state.from = document.getElementById('dateFrom').value;
  state.to = document.getElementById('dateTo').value;
  state.q = document.getElementById('searchInput').value.trim();
  state.page = 1;
  loadPage();
}

function resetFilter() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.getElementById('searchInput').value = '';
  state = { page:1, q:'', from:'', to:'', platform:'', groups: new Set() };
  ['msPlatform','msGroup'].forEach(id => { syncMsChecks(id); updateMsDisplay(id); });
  loadPage();
}

/* Modal */
async function openDetail(idx) {
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  body.innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const d = await fetch('/api/discussion/' + idx).then(r => r.json());
    if (d.error) { body.innerHTML = '<div class="empty-state">记录未找到</div>'; return; }

    const titleHtml = (d.title || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const contentHtml = (d.content || '').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    const urlHtml = d.url
      ? '<a href="' + d.url + '" target="_blank" rel="noopener" style="color:var(--info);word-break:break-all;font-size:.88rem">' + d.url + '</a>'
      : '<span style="color:var(--text-tertiary)">无</span>';

    const relevanceColor = (d.relevance_score || 0) >= 0.7 ? '#34d399' :
                           (d.relevance_score || 0) >= 0.5 ? '#fbbf24' :
                           (d.relevance_score || 0) >= 0.3 ? '#fb923c' : '#f87171';

    body.innerHTML =
      '<div class="detail-section">' +
        '<div class="detail-label">标题</div>' +
        '<div class="detail-text" style="font-weight:600;font-size:1.05rem">' + titleHtml + '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-label">全文摘要</div>' +
        '<div class="detail-text">' + (contentHtml || '<span style="color:var(--text-tertiary)">无内容</span>') + '</div>' +
      '</div>' +
      '<div class="detail-section">' +
        '<div class="detail-label">基本信息</div>' +
        '<div class="detail-meta">' +
          '<div class="meta-item"><div class="ml">发布时间</div><div class="mv mono">' + (d.date || '---') + '</div></div>' +
          '<div class="meta-item"><div class="ml">来源平台</div><div class="mv">' + (d.platform || '---') + '</div></div>' +
          '<div class="meta-item"><div class="ml">主题分类</div><div class="mv">' + (d.keyword_group || '---') + '</div></div>' +
          '<div class="meta-item"><div class="ml">相关度</div><div class="mv mono" style="color:' + relevanceColor + '">' +
            (d.relevance_score != null ? (d.relevance_score * 100).toFixed(0) + '%' : '---') + '</div></div>' +
          '<div class="meta-item"><div class="ml">作者</div><div class="mv">' + (d.author || '---') + '</div></div>' +
          '<div class="meta-item"><div class="ml">匹配关键词</div><div class="mv">' + (d.matched_keyword || '---') + '</div></div>' +
          '<div class="meta-item meta-full"><div class="ml">原文链接</div><div class="mv">' + urlHtml + '</div></div>' +
        '</div>' +
      '</div>';
  } catch(e) {
    body.innerHTML = '<div class="empty-state">加载失败</div>';
  }
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
